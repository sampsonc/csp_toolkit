<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #e4e4e7;
      background: #18181b;
    }
    .header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #27272a;
    }
    .grade-badge {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .header-info { flex: 1; }
    .header-info .url {
      font-size: 12px;
      color: #a1a1aa;
      word-break: break-all;
      max-height: 32px;
      overflow: hidden;
    }
    .header-info .score {
      font-size: 16px;
      font-weight: 600;
      margin-top: 2px;
    }
    .section {
      padding: 8px 16px;
      border-bottom: 1px solid #27272a;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #71717a;
      margin-bottom: 6px;
    }
    .finding {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 4px 0;
    }
    .sev {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      white-space: nowrap;
      min-width: 36px;
      text-align: center;
    }
    .sev-critical { background: #dc2626; color: #fff; }
    .sev-high { background: #ef4444; color: #fff; }
    .sev-medium { background: #eab308; color: #000; }
    .sev-low { background: #06b6d4; color: #000; }
    .sev-info { background: #3f3f46; color: #a1a1aa; }
    .finding-title {
      font-size: 12px;
      line-height: 1.4;
    }
    .directive-tag {
      font-size: 10px;
      color: #a1a1aa;
      background: #27272a;
      padding: 1px 4px;
      border-radius: 2px;
      margin-left: 4px;
    }
    .no-csp {
      padding: 24px 16px;
      text-align: center;
      color: #a1a1aa;
    }
    .no-csp .emoji { font-size: 32px; margin-bottom: 8px; }
    .raw-csp {
      font-family: monospace;
      font-size: 11px;
      color: #a1a1aa;
      background: #0f0f10;
      padding: 8px;
      border-radius: 4px;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
    }
    .counts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .count-chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #27272a;
    }
    .grade-A-plus, .grade-A { background: #166534; }
    .grade-B { background: #854d0e; }
    .grade-C { background: #9a3412; }
    .grade-D { background: #991b1b; }
    .grade-F { background: #7f1d1d; }
    .grade-none { background: #3f3f46; }
  </style>
</head>
<body>
  <div id="content">
    <div class="no-csp">Loading...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
