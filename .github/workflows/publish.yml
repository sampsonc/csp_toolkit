# Publish to PyPI using trusted publishing (OIDC).
# Trusted publishing (OIDC): https://docs.pypi.org/trusted-publishers/
# Add this repo + workflow at https://pypi.org/manage/project/csp-toolkit/settings/publishing/
# (Workflow file: publish.yml — leave “environment” blank unless you add one below.)

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format
        run: uv run ruff format --check src/ tests/

      - name: Test with coverage
        run: |
          uv run pytest -v --tb=short \
            --cov=csp_toolkit \
            --cov-report=term \
            --cov-fail-under=75

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
